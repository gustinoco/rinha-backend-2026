events {
  worker_connections 1024;
}

http {
  upstream fraud_api {
    server api1:8080;
    server api2:8080;
    keepalive 32;
  }

  server {
    listen 9999;
    client_max_body_size 1m;

    location / {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_pass http://fraud_api;
    }
  }
}
