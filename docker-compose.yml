services:
  nginx:
    image: nginx:1.27-alpine
    platform: linux/amd64
    cpus: 0.10
    mem_limit: 24m
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 24M
    ports:
      - '9999:9999'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2

  api1:
    image: gustavotinoo/rinha-fraud-api:v0.4.2-7b21e24
    platform: linux/amd64
    cpus: 0.45
    mem_limit: 163m
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: 163M
    environment:
      NODE_ENV: production
      PORT: 8080
      BODY_LIMIT_BYTES: 1048576
    expose:
      - '8080'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', '--tries=1', 'http://localhost:8080/ready']
      interval: 2s
      timeout: 1s
      retries: 30
      start_period: 30s

  api2:
    image: gustavotinoo/rinha-fraud-api:v0.4.2-7b21e24
    platform: linux/amd64
    cpus: 0.45
    mem_limit: 163m
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: 163M
    environment:
      NODE_ENV: production
      PORT: 8080
      BODY_LIMIT_BYTES: 1048576
    expose:
      - '8080'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', '--tries=1', 'http://localhost:8080/ready']
      interval: 2s
      timeout: 1s
      retries: 30
      start_period: 30s

networks:
  default:
    driver: bridge
