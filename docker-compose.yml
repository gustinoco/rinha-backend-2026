services:
  nginx:
    image: nginx:1.27-alpine
    platform: linux/amd64
    cpus: 0.10
    mem_limit: 32m
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 32M
    ports:
      - '9999:9999'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2

  api1:
    image: gustavotinoo/rinha-fraud-api:latest
    build: .
    platform: linux/amd64
    cpus: 0.45
    mem_limit: 159m
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: 159M
    environment:
      NODE_ENV: production
      PORT: 8080
      BODY_LIMIT_BYTES: 1048576
    expose:
      - '8080'

  api2:
    image: gustavotinoo/rinha-fraud-api:latest
    build: .
    platform: linux/amd64
    cpus: 0.45
    mem_limit: 159m
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: 159M
    environment:
      NODE_ENV: production
      PORT: 8080
      BODY_LIMIT_BYTES: 1048576
    expose:
      - '8080'

networks:
  default:
    driver: bridge
